<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify — Qbix Centre Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0b0d11;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#13161e;border:1px solid #252a38;border-radius:14px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#d4a843;margin-bottom:8px}
.icon{font-size:48px;margin:20px 0}
h2{color:#dde2ed;font-size:18px;margin-bottom:10px}
p{color:#7d8aa0;font-size:14px;margin-bottom:28px;line-height:1.6}
input{width:100%;padding:14px;background:#1b1f2b;border:1px solid #252a38;border-radius:8px;color:#dde2ed;font-family:'IBM Plex Mono',monospace;font-size:28px;letter-spacing:12px;text-align:center;outline:none;transition:border-color .2s;margin-bottom:16px}
input:focus{border-color:#d4a843}
button{width:100%;padding:12px;background:#d4a843;border:none;border-radius:8px;color:#1a0e00;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
button:hover{opacity:.85}
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:20px;background:rgba(217,96,96,.15);color:#d96060;border:1px solid rgba(217,96,96,.3)}
.back{display:block;margin-top:20px;color:#404860;font-size:13px;text-decoration:none}
.back:hover{color:#7d8aa0}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Qbix Centre</div>
  <div class="icon">📱</div>
  <h2>Check Your Phone</h2>
  <p>We sent a 6-digit verification code to your phone. Enter it below to complete sign in.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <input type="text" name="code" maxlength="6" placeholder="000000"
           oninput="this.value=this.value.replace(/\D/g,'')"
           autocomplete="one-time-code" autofocus required>
    <button type="submit">Verify &amp; Sign In</button>
  </form>
  <a href="/admin/login" class="back">← Back to login</a>
</div>
</body>
</html>
