<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Qbix Centre</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0b0d11;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#13161e;border:1px solid #252a38;border-radius:14px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#d4a843;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:#7d8aa0;font-size:13px;margin-bottom:32px}
label{display:block;font-size:12px;font-weight:600;color:#7d8aa0;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#1b1f2b;border:1px solid #252a38;border-radius:8px;color:#dde2ed;font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:16px}
input:focus{border-color:#d4a843}
button{width:100%;padding:12px;background:#d4a843;border:none;border-radius:8px;color:#1a0e00;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:4px}
button:hover{opacity:.85}
.alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:20px;background:rgba(217,96,96,.15);color:#d96060;border:1px solid rgba(217,96,96,.3)}
.back{display:block;text-align:center;margin-top:20px;color:#404860;font-size:13px;text-decoration:none}
.back:hover{color:#7d8aa0}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">Qbix Centre</div>
  <div class="subtitle">Management Portal — Admin Login</div>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert">{{ message }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" autofocus required>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button type="submit">Sign In</button>
  </form>
  <a href="/" class="back">← Back to website</a>
</div>
</body>
</html>
